<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/estilos.css">
    <title>Explorar</title>
</head>
<body>
<header class="sticky-top">
        <div class="container-fluid mb-3">
            <div class="row">
                <nav class="navbar navbar-expand-lg navbar-dark mx-auto bg-dark">
                    <div class="container-fluid mx-2 my-2 position-relative">
                        <a class="navbar-brand" href="inicio.html"><img src="../img/logo.png" alt="Logo" width="250" height="auto" class="d-inline-block align-text-top img"></a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="icono-hamb"><i class="bi bi-caret-down-fill"></i></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">

                            <!-- Menú centrado -->
                            <ul class="navbar-nav mx-auto links">
                                <li class="nav-item px-2">
                                    <a class="nav-link btn-nav" href="explorar.html">Explorar</a>
                                </li>
                                <li class="nav-item px-2">
                                    <a class="nav-link btn-nav" href="listas.html">Listas</a>
                                </li>
                                <li class="nav-item px-2">
                                    <a class="nav-link btn-nav" href="../html/inicio.html#Contacto">Contacto</a>
                                </li>
                            </ul>

                            <!-- Buscador y usuario a la derecha -->
                            <div class="d-flex flex-row flex-lg-row align-items-center ms-auto busquedaYusuario">
                                <form id="busquedaNav" class="d-flex me-3">
                                    <input class="form-control me-2" id="cuadroBusqueda" type="search" placeholder="Buscar...">
                                    <button class="btn btn-outline-success" id="busqueda" type="submit">
                                        <i class="bi bi-search"></i>
                                    </button>
                                </form>

                                <a href="perfil.html">
                                    <button class="btn btn-user" type="button">
                                        <i class="bi bi-person-fill"></i>
                                    </button>
                                </a>
                            </div>

                        </div>
                    </div>
                </nav>
            </div>
        </div>
</header> 


<main class="main-explorar tarjeta-lista">

    <section class="container">

        <div class="row mb-5">
            <div class="col-12">
                <div class="encabezado-explorar text-center">

                    <div class="icono-explorar mb-3">
                        <i class="bi bi-search-heart"></i>
                    </div>

                    <h1 class="fw-bold titulo-explorar">Explorar contenido</h1>

                    <p class="texto-explorar">
                        Buscá series y películas por título, género o tipo de contenido.
                        Encontrá rápido qué ver según tus gustos.
                    </p>

                </div>
            </div>
        </div>

        <div class="row g-3 mb-5 filtros-explorar">

            <div class="col-12 col-md-4">
                <label for="buscarExplorar" class="form-label">Buscar por título</label>
                <input type="text" class="form-control" id="buscarExplorar" placeholder="Ej: The Walking Dead">
            </div>

            <div class="col-12 col-md-3">
                <label for="filtroGenero" class="form-label">Género</label>
                <select class="form-control" id="filtroGenero">
                    <option value="">Todos</option>
                    <option value="Terror">Terror</option>
                    <option value="Drama">Drama</option>
                    <option value="Ciencia Ficción">Ciencia Ficción</option>
                    <option value="Acción">Acción</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Romance">Romance</option>
                    <option value="Suspenso">Suspenso</option>
                </select>
            </div>

            <div class="col-12 col-md-3">
                <label for="filtroTipo" class="form-label">Tipo</label>
                <select class="form-control" id="filtroTipo">
                    <option value="">Todos</option>
                    <option value="Película">Películas</option>
                    <option value="Serie">Series</option>
                </select>
            </div>

            <div class="col-12 col-md-2">
                <label for="ordenarExplorar" class="form-label">Ordenar</label>
                <select class="form-control" id="ordenarExplorar">
                    <option value="">Normal</option>
                    <option value="az">A-Z</option>
                    <option value="puntuacion">Mayor puntuación</option>
                </select>
            </div>

        </div>

        <div class="row mb-3">
            <div class="col-12">
                <h2 class="fs-4 titulo-resultados-explorar">Resultados</h2>
            </div>
        </div>

        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3" id="contenedor-explorar">
            <!-- Acá se cargan las tarjetas desde el JSON -->
        </div>

    </section>

</main>



    <footer class="footer">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 p-4 d-flex flex-column flex-lg-row justify-content-between align-items-center text-center">
                    
                    <a href="#"><img src="../img/logo.png" alt="Logo" width="250" height="auto" class="d-inline-block align-text-top img m-3"></a>

                    <p class="mb-0 text-center m-3">© 2026 Watchealo</p>

                    <div class="m-3 d-flex">
                        <a class="px-2" href="https://www.facebook.com/" target="_blank"><i class="bi bi-facebook icons"></i></a>
                        <a class="px-2" href="https://www.instagram.com/" target="_blank"><i class="bi bi-instagram icons"></i></a>
                        <a class="px-2" href="https://x.com/?lang=es" target="_blank"><i class="bi bi-twitter-x icons"></i></a>
                    </div>

                </div>
            </div>

            <hr class="mx-4 opacity-25 my-0">

            <div class="row">
                <div class="col-12 x-4 text-center">
                    <p class="mb-0 m-3">Diseño y Desarrollo a cargo de Cuello Jaqueline, Garcés Agustín y Ponce Ulises</p>
                </div>
            </div>

        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

    <script src="../js/comp.js"></script>
    <script src="../js/explorar.js"></script>
</body>
</html>
